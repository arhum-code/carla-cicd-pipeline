name: CARLA Validation Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  stage1-static-analysis:
    name: "Stage 1 — Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flake8 pylint bandit

      - name: Run Flake8
        run: flake8 test_projects/scenario_runner --max-line-length=120 --statistics || true

      - name: Run Pylint
        run: pylint test_projects/scenario_runner --exit-zero --output-format=json > results/stage1/pylint_report.json || true

      - name: Run Bandit
        run: bandit -r test_projects/scenario_runner -f json -o results/stage1/bandit_report.json || true

      - name: Run CARLA Custom Rules
        run: |
          mkdir -p results/stage1
          python3 pipeline/stage1_static/carla_custom_rules.py \
            --target test_projects/scenario_runner \
            --output results/stage1/carla_rules_report.json

      - name: Check for BLOCKER violations
        run: |
          python3 pipeline/stage1_static/print_failure_report.py \
            --summary results/stage1/carla_rules_report.json

      - name: Upload Stage 1 results
        uses: actions/upload-artifact@v4
        with:
          name: stage1-results
          path: results/stage1/

  stage2-formal-synthesis:
    name: "Stage 2 — Formal Scenario Synthesis"
    runs-on: [self-hosted]
    needs: stage1-static-analysis
    steps:
      - uses: actions/checkout@v4

      - name: Download Stage 1 results
        uses: actions/download-artifact@v4
        with:
          name: stage1-results
          path: results/stage1/

      - name: Extract Agent Model
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd ~/Desktop/carla-cicd-pipeline
          python3 pipeline/stage2_formal/extract_agent_model.py \
            --agent-dir test_projects/scenario_runner \
            --output results/stage2/agent_model_seeded.smv \
            --project scenario_runner_seeded

      - name: Run nuXmv Model Checker
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd ~/Desktop/carla-cicd-pipeline
          python3 pipeline/stage2_formal/run_model_checker.py \
            --model results/stage2/agent_model_seeded.smv \
            --output results/stage2/counterexamples_seeded.json \
            --timeout 300

      - name: Run CARLA Scenarios
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd ~/Desktop/carla-cicd-pipeline
          python3 pipeline/stage2_formal/run_scenarios.py \
            --scenarios-dir results/stage2/scenarios_seeded \
            --scenario-runner test_projects/scenario_runner/scenario_runner.py \
            --output results/stage2/simulation_results.json \
            --carla-port 2000 --timeout 30

      - name: Upload Stage 2 results
        uses: actions/upload-artifact@v4
        with:
          name: stage2-results
          path: results/stage2/

  aggregate-metrics:
    name: "Aggregate Pipeline Metrics"
    runs-on: [self-hosted]
    needs: stage2-formal-synthesis
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          name: stage1-results
          path: results/stage1/

      - name: Download Stage 2 results
        uses: actions/download-artifact@v4
        with:
          name: stage2-results
          path: results/stage2/

      - name: Run Metrics Aggregator
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd ~/Desktop/carla-cicd-pipeline
          python3 metrics/aggregate_pipeline_metrics.py \
            --ground-truth defect_seeding/ground_truth.json \
            --stage1 results/stage1/combined_report.json \
            --stage2-clean results/stage2/counterexamples.json \
            --stage2-seeded results/stage2/counterexamples_seeded.json \
            --output results/metrics_report.json

      - name: Upload Metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-report
          path: results/metrics_report.json
