name: CARLA Validation Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  stage1-static-analysis:
    name: "Stage 1 — Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install flake8 flake8-json pylint bandit
      
      - name: Create results dir
        run: mkdir -p results/stage1
        
      - name: Record Stage 1 start time
        run: echo "STAGE1_START=$(date +%s)" >> $GITHUB_ENV
      
      - name: Run Flake8
        run: flake8 test_projects/scenario_runner --max-line-length=120 --format=json --output-file=results/stage1/flake8_report.json || true
      
      - name: Run Pylint
        run: |
          find test_projects/scenario_runner -name '*.py' | xargs pylint --exit-zero --output-format=json 2>/dev/null > results/stage1/pylint_report.json || true
      
      - name: Run Bandit
        run: bandit -r test_projects/scenario_runner -f json -o results/stage1/bandit_report.json || true
      
      - name: Run CARLA Custom Rules
        run: |
          mkdir -p results/stage1
          python3 pipeline/stage1_static/carla_custom_rules.py \
            --target test_projects/scenario_runner \
            --output results/stage1/carla_rules_report.json
          python3 pipeline/stage1_static/carla_custom_rules.py \
            --target test_projects/leaderboard \
            --output results/stage1/leaderboard_rules_report.json
      
      - name: Generate Combined Stage 1 Report
        run: |
          python3 pipeline/stage1_static/aggregate_results.py \
            --results-dir results/stage1 \
            --output results/stage1/combined_report.json
      
      - name: Check for BLOCKER violations
        run: |
          python3 pipeline/stage1_static/print_failure_report.py \
            --summary results/stage1/carla_rules_report.json \
            --baseline defect_seeding/stage1_baseline.json
      
      - name: Write Stage 1 timing
        run: |
          mkdir -p results/stage1
          echo "{\"stage\": \"stage1\", \"start\": $STAGE1_START, \"end\": $(date +%s), \"duration_sec\": $(($(date +%s) - $STAGE1_START))}" > results/stage1/timing.json
      
      - name: Upload Stage 1 results
        uses: actions/upload-artifact@v4
        with:
          name: stage1-results
          path: results/stage1/

  stage2-formal-synthesis:
    name: "Stage 2 — Formal Scenario Synthesis"
    runs-on: [self-hosted]
    needs: stage1-static-analysis
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Stage 1 results
        uses: actions/download-artifact@v4
        with:
          name: stage1-results
          path: results/stage1/
      
      - name: Record Stage 2 start time
        run: date +%s > /tmp/s2start
      
      - name: Extract Agent Model
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd /home/zaeem/Desktop/carla-cicd-pipeline
          python3 pipeline/stage2_formal/extract_agent_model.py \
            --agent-dir test_projects/scenario_runner_backup \
            --output results/stage2/agent_model_clean.smv \
            --project scenario_runner_clean
          python3 pipeline/stage2_formal/extract_agent_model.py \
            --agent-dir test_projects/scenario_runner \
            --output results/stage2/agent_model_seeded.smv \
            --project scenario_runner_seeded
      
      - name: Run nuXmv Model Checker
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd /home/zaeem/Desktop/carla-cicd-pipeline
          python3 pipeline/stage2_formal/run_model_checker.py \
            --model results/stage2/agent_model_clean.smv \
            --output results/stage2/counterexamples.json \
            --timeout 300
          python3 pipeline/stage2_formal/run_model_checker.py \
            --model results/stage2/agent_model_seeded.smv \
            --output results/stage2/counterexamples_seeded.json \
            --timeout 300
      
      - name: Run CARLA Scenarios
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd /home/zaeem/Desktop/carla-cicd-pipeline
          python3 pipeline/stage2_formal/run_scenarios.py \
            --scenarios-dir results/stage2/scenarios_seeded \
            --scenario-runner test_projects/scenario_runner/scenario_runner.py \
            --output results/stage2/simulation_results.json \
            --carla-port 2000 --timeout 30
      
      - name: Write Stage 2 timing
        run: |
          START=$(cat /tmp/s2start)
          END=$(date +%s)
          DURATION=$((END - START))
          printf '{"stage":"stage2","start":%s,"end":%s,"duration_sec":%s}' "$START" "$END" "$DURATION" > results/stage2/timing.json
      
      - name: Upload Stage 2 results
        uses: actions/upload-artifact@v4
        with:
          name: stage2-results
          path: results/stage2/

  stage3-llm-generation:
    name: "Stage 3 — LLM-Assisted Generation"
    runs-on: [self-hosted]
    needs: stage2-formal-synthesis
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Stage 2 results
        uses: actions/download-artifact@v4
        with:
          name: stage2-results
          path: results/stage2/
      
      - name: Record Stage 3 start time
        run: date +%s > /tmp/s3start
      
      - name: Create results directory
        run: mkdir -p results/stage3
      
      - name: Install Python dependencies
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          pip install requests --quiet
      
      - name: Generate LLM Scenarios
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd /home/zaeem/Desktop/carla-cicd-pipeline
          python3 pipeline/stage3_llm/llm_hf.py --project scenario_runner_seeded --agent-type perception --num-scenarios 20 --output-dir results/stage3/scenarios
      
      - name: Validate Generated Scenarios
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd /home/zaeem/Desktop/carla-cicd-pipeline
          # Count successful scenarios
          SCENARIOS=$(ls results/stage3/scenarios/*.xosc 2>/dev/null | wc -l)
          echo "Generated $SCENARIOS scenarios"
          echo "{\"generated_count\": $SCENARIOS}" > results/stage3/generation_stats.json
      
      - name: Run LLM Scenarios in CARLA
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd /home/zaeem/Desktop/carla-cicd-pipeline
          python3 pipeline/stage3_llm/run_llm_scenarios.py --scenarios-dir results/stage3/scenarios --scenario-runner test_projects/scenario_runner/scenario_runner.py --output results/stage3/simulation_results.json --stage3-metadata results/stage3/scenarios/scenario_runner_seeded_metadata.json --carla-port 2000 --timeout 30
      
      - name: Write Stage 3 timing
        run: |
          START=$(cat /tmp/s3start)
          END=$(date +%s)
          DURATION=$((END - START))
          printf '{"stage":"stage3","start":%s,"end":%s,"duration_sec":%s}' "$START" "$END" "$DURATION" > results/stage3/timing.json
      
      - name: Upload Stage 3 results
        uses: actions/upload-artifact@v4
        with:
          name: stage3-results
          path: results/stage3/

  aggregate-metrics:
    name: "Aggregate Pipeline Metrics"
    runs-on: [self-hosted]
    needs: [stage1-static-analysis, stage2-formal-synthesis, stage3-llm-generation]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Stage 1 results
        uses: actions/download-artifact@v4
        with:
          name: stage1-results
          path: results/stage1/
      
      - name: Download Stage 2 results
        uses: actions/download-artifact@v4
        with:
          name: stage2-results
          path: results/stage2/
      
      - name: Download Stage 3 results
        uses: actions/download-artifact@v4
        with:
          name: stage3-results
          path: results/stage3/
      
      - name: Run Metrics Aggregator
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd /home/zaeem/Desktop/carla-cicd-pipeline
          python3 metrics/aggregate_pipeline_metrics.py --ground-truth defect_seeding/ground_truth.json --stage1 results/stage1/combined_report.json --stage2-clean results/stage2/counterexamples.json --stage2-seeded results/stage2/counterexamples_seeded.json --simulation-results results/stage2/simulation_results.json --stage3-simulation results/stage3/simulation_results.json --stage3-metadata results/stage3/scenarios/scenario_runner_seeded_metadata.json --stage1-timing results/stage1/timing.json --stage2-timing results/stage2/timing.json --stage3-timing results/stage3/timing.json --output results/metrics_report.json
      
      - name: Print Summary
        run: |
          source /home/zaeem/anaconda3/etc/profile.d/conda.sh
          conda activate carla_9_16_pipeline
          cd /home/zaeem/Desktop/carla-cicd-pipeline
          python3 metrics/print_summary.py --metrics results/metrics_report.json
      
      - name: Upload Metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-report
          path: results/metrics_report.json
